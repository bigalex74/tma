<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Translation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg-color: #f0f2f5; --tg-theme-secondary-bg-color: #ffffff; --tg-theme-text-color: #222; --tg-theme-button-color: #3390ec; }
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); font-family: sans-serif; padding: 16px; }
        .section { background: white; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
        select { width: 100%; padding: 12px; border-radius: 8px; }
        .btn-start { width: 100%; padding: 14px; background: var(--tg-theme-button-color); color: white; border: none; border-radius: 8px; }
        .btn-cancel { width: 100%; padding: 14px; background: #ff3b30; color: white; border: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Новый перевод</h2>
    <div class="section"><label>📄 Файл</label><select id="sel-file" onchange="validate()"><option value="">Выберите...</option></select></div>
    <div class="section">
        <label>📖 Глоссарий</label>
        <select id="glossary-mode" onchange="toggleGlossary()"><option value="use_existing">Использовать готовый</option><option value="create_ai">Создать новый (AI)</option></select>
        <select id="sel-glossary" style="margin-top: 8px;" onchange="validate()"><option value="">Выберите файл...</option></select>
    </div>
    <div class="section"><label>🤖 Доп. промт</label><select id="sel-bp" onchange="validate()"><option value="">Выберите...</option></select></div>
    <div class="section"><label>✍️ Промт для постредактирования</label><select id="sel-pp" onchange="validate()"><option value="">Выберите...</option></select></div>
    
    <button id="btn-start" class="btn-start" onclick="submit()" disabled>🚀 Начать перевод</button>
    <button class="btn-cancel" onclick="window.location.href='/'">❌ Отмена</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        async function init() {
            const user_id = tg.initDataUnsafe.user?.id;
            if (!user_id) { console.error("ID пользователя не получен"); return; }
            
            const data = await (await fetch(`/api/get-form-data?chat_id=${user_id}`)).json();
            data.files_ko.forEach(f => document.getElementById('sel-file').innerHTML += `<option value="${f.file_id}">${f.name}</option>`);
            data.glossaries.forEach(g => document.getElementById('sel-glossary').innerHTML += `<option value="${g.file_id}">${g.name}</option>`);
            data.prompts_ru.forEach(p => { 
                [document.getElementById('sel-bp'), document.getElementById('sel-pp')].forEach(s => s.innerHTML += `<option value="${p.file_id}">${p.name}</option>`);
            });
        }
        function toggleGlossary() { document.getElementById('sel-glossary').style.display = (document.getElementById('glossary-mode').value === 'use_existing') ? 'block' : 'none'; validate(); }
        function validate() { 
            const f = document.getElementById('sel-file').value;
            const mode = document.getElementById('glossary-mode').value;
            const g = document.getElementById('sel-glossary').value;
            document.getElementById('btn-start').disabled = !(f && (mode === 'create_ai' || (mode === 'use_existing' && g !== '')));
        }
        async function submit() {
            const user_id = tg.initDataUnsafe.user.id;
            const f = document.getElementById('sel-file');
            const g = document.getElementById('sel-glossary');
            const bp = document.getElementById('sel-bp');
            const pp = document.getElementById('sel-pp');
            const payload = {
                file_id: f.value, file_name: f.options[f.selectedIndex].text,
                chat_id: user_id,
                bp_file_id: bp.value, bp_file_name: bp.options[bp.selectedIndex].text,
                pp_file_id: pp.value, pp_file_name: pp.options[pp.selectedIndex].text,
                glossary_id: document.getElementById('glossary-mode').value === 'use_existing' ? g.value : null,
                glossary_file_name: document.getElementById('glossary-mode').value === 'use_existing' ? g.options[g.selectedIndex].text : null,
                create_glossary: document.getElementById('glossary-mode').value === 'create_ai'
            };
            const res = await fetch('/api/start-translation', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if (res.ok) { tg.showAlert("Запущено!"); tg.close(); } else { tg.showAlert("Ошибка!"); }
        }
        init();
    </script>
</body>
</html>
