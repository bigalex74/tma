<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выберите категорию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #f0f2f5; }
        .card { display: block; padding: 20px; background: white; margin-bottom: 10px; border-radius: 12px; text-decoration: none; color: #000; font-weight: 600; text-align: center; }
    </style>
</head>
<body>
    <h2>Что делаем?</h2>
    <a href="/files" id="link-files" class="card">📁 Новый перевод</a>
    <a href="/manage-menu" class="card">🗑️ Удаление файлов</a>
    <a href="/prompts" class="card">🤖 Управление промптами</a>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const chat_id = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;
        document.getElementById('link-files').href = `/files?chat_id=${chat_id}`;
    </script>
</body>
</html>
