<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bigalexn8n Apps</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #f0f0f0;
            --tg-theme-secondary-bg-color: #fff;
            --tg-theme-text-color: #000;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #fff;
        }
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; box-sizing: border-box;
        }
        .header { margin-bottom: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { color: #666; margin-top: 8px; }

        .apps-grid {
            display: grid; grid-template-columns: 1fr; gap: 16px; width: 100%; max-width: 400px;
        }
        .app-card {
            background: var(--tg-theme-secondary-bg-color);
            padding: 20px; border-radius: 16px; text-decoration: none;
            display: flex; align-items: center; gap: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .app-card:active { transform: scale(0.98); border-color: var(--tg-theme-button-color); }
        .app-icon { font-size: 32px; }
        .app-info { display: flex; flex-direction: column; }
        .app-title { font-weight: bold; font-size: 18px; color: var(--tg-theme-text-color); }
        .app-desc { font-size: 13px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="main-hero-img" style="font-size: 60px; margin-bottom: 10px;">📚</div>
        <h1>Панель управления</h1>
        <p>bigalexn8n translation system</p>
    </div>

    <div class="apps-grid">
        <!-- Кнопка Нового перевода -->
        <a href="/files" class="app-card" id="files-link-btn">
            <span class="app-icon">📁</span>
            <div class="app-info">
                <span class="app-title">Новый перевод</span>
                <span class="app-desc">Запустить перевод из списка</span>
            </div>
        </a>

        <!-- Кнопка Промптов -->
        <a href="/prompts" class="app-card">
            <span class="app-icon">📝</span>
            <div class="app-info">
                <span class="app-title">Промпты</span>
                <span class="app-desc">Настройка ИИ-агентов</span>
            </div>
        </a>

        <!-- Заглушка Статистики -->
        <div class="app-card" style="opacity: 0.6; cursor: not-allowed;">
            <span class="app-icon">📊</span>
            <div class="app-info">
                <span class="app-title">Статистика</span>
                <span class="app-desc">В разработке</span>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
