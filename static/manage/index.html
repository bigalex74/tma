<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 16px; background: #f0f2f5; }
        .file-item { padding: 15px; background: white; margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .file-item.selected { background: #fee; border: 2px solid #ff3b30; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 14px; flex: 1; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <h2 id="title">Выбор файлов</h2>
    <div id="file-list"></div>
    <div class="btn-group">
        <button style="background: #ff3b30; color: white;" onclick="hideSelected()">❌ Деактивировать</button>
        <button onclick="window.location.href='/manage-menu'">⬅ Назад</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        let selectedFiles = new Set();
        async function init() {
            const type = new URLSearchParams(window.location.search).get('type');
            const data = await (await fetch('/api/get-form-data')).json();
            const list = document.getElementById('file-list');
            let items = (type === 'ko') ? data.files_ko : (type === 'xlsx') ? data.glossaries : data.prompts_ru;

            items.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.textContent = f.name;
                div.onclick = () => {
                    if(selectedFiles.has(f.file_id)) { selectedFiles.delete(f.file_id); div.classList.remove('selected'); }
                    else { selectedFiles.add(f.file_id); div.classList.add('selected'); }
                };
                list.appendChild(div);
            });
        }
        async function hideSelected() {
            if(selectedFiles.size === 0) return;
            const res = await fetch('/api/files/hide', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({file_ids: Array.from(selectedFiles)}) 
            });
            if(res.ok) { tg.showAlert("Файлы деактивированы!"); window.location.href = '/'; }
        }
        init();
    </script>
</body>
</html>
